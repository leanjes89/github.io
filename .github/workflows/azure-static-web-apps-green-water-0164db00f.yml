name: Despliegue a Azure

on:
  push:
    branches:
      - main

jobs:
  deploy_job:
    runs-on: ubuntu-latest
    name: Desplegar Landing Page
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Subir a Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_WATER_0164DB00F }}
          action: "upload"
          app_location: "/"
          skip_app_build: true
